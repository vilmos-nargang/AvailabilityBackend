swagger: "2.0"

info:
  title: AvailabilityBackend API
  version: "0.1.0"

host: localhost:3000
basePath: /api
schemes:
  - http

consumes:
  - application/json

produces:
  - application/json

securityDefinitions:
  Bearer:
    type: apiKey
    name: Authorization
    in: header
    description: "Use: Bearer <token>"

paths:

  /auth/register:
    post:
      tags:
        - Auth
      summary: Register user
      parameters:
        - in: body
          name: body
          required: true
          schema:
            $ref: "#/definitions/RegisterRequest"
      responses:
        201:
          description: Registered
          schema:
            $ref: "#/definitions/AuthResponse"
        400:
          description: Bad request
          schema:
            $ref: "#/definitions/ErrorResponse"

  /auth/login:
    post:
      tags:
        - Auth
      summary: Login user
      parameters:
        - in: body
          name: body
          required: true
          schema:
            $ref: "#/definitions/LoginRequest"
      responses:
        200:
          description: Logged in
          schema:
            $ref: "#/definitions/AuthResponse"
        401:
          description: Invalid credentials
          schema:
            $ref: "#/definitions/ErrorResponse"

  /monitors:
    get:
      tags:
        - Monitors
      summary: List user's monitors
      security:
        - Bearer: []
      responses:
        200:
          description: Monitor list
          schema:
            type: array
            items:
              $ref: "#/definitions/Monitor"
        401:
          description: Unauthorized
          schema:
            $ref: "#/definitions/ErrorResponse"

    post:
      tags:
        - Monitors
      summary: Add a monitor
      security:
        - Bearer: []
      parameters:
        - in: body
          name: body
          required: true
          schema:
            $ref: "#/definitions/CreateMonitorRequest"
      responses:
        201:
          description: Created
          schema:
            $ref: "#/definitions/Monitor"
        400:
          description: Bad request
          schema:
            $ref: "#/definitions/ErrorResponse"
        401:
          description: Unauthorized
          schema:
            $ref: "#/definitions/ErrorResponse"

  /monitors/{monitorId}:
    delete:
      tags:
        - Monitors
      summary: Delete monitor
      security:
        - Bearer: []
      parameters:
        - name: monitorId
          in: path
          required: true
          type: string
      responses:
        204:
          description: Deleted
        401:
          description: Unauthorized
          schema:
            $ref: "#/definitions/ErrorResponse"
        404:
          description: Not found
          schema:
            $ref: "#/definitions/ErrorResponse"

  /monitors/{monitorId}/check-now:
    post:
      tags:
        - Checks
      summary: Manually check one monitor now
      security:
        - Bearer: []
      parameters:
        - name: monitorId
          in: path
          required: true
          type: string
      responses:
        201:
          description: Check result
          schema:
            $ref: "#/definitions/CheckResult"
        401:
          description: Unauthorized
          schema:
            $ref: "#/definitions/ErrorResponse"
        404:
          description: Monitor not found
          schema:
            $ref: "#/definitions/ErrorResponse"

  /monitors/{monitorId}/checks:
    get:
      tags:
        - Checks
      summary: Get recent checks for one monitor
      security:
        - Bearer: []
      parameters:
        - name: monitorId
          in: path
          required: true
          type: string
        - name: limit
          in: query
          required: false
          type: integer
          default: 20
      responses:
        200:
          description: Recent checks
          schema:
            type: array
            items:
              $ref: "#/definitions/CheckResult"
        401:
          description: Unauthorized
          schema:
            $ref: "#/definitions/ErrorResponse"
        404:
          description: Monitor not found
          schema:
            $ref: "#/definitions/ErrorResponse"

definitions:

  RegisterRequest:
    type: object
    required:
      - email
      - password
    properties:
      email:
        type: string
        format: email
        example: student@example.com
      password:
        type: string
        example: password123

  LoginRequest:
    type: object
    required:
      - email
      - password
    properties:
      email:
        type: string
        format: email
        example: student@example.com
      password:
        type: string
        example: password123

  AuthResponse:
    type: object
    properties:
      token:
        type: string
        example: eyJhbGciOiJIUzI1...
      user:
        $ref: "#/definitions/User"

  User:
    type: object
    properties:
      id:
        type: string
        example: usr_1
      email:
        type: string
        example: student@example.com

  CreateMonitorRequest:
    type: object
    required:
      - name
      - url
    properties:
      name:
        type: string
        example: Example Site
      url:
        type: string
        format: uri
        example: https://example.com
      method:
        type: string
        enum:
          - HEAD
          - GET
        default: HEAD
        example: HEAD

  Monitor:
    type: object
    properties:
      id:
        type: string
        example: mon_1
      userId:
        type: string
        example: usr_1
      name:
        type: string
        example: Example Site
      url:
        type: string
        example: https://example.com
      method:
        type: string
        enum:
          - HEAD
          - GET
        example: HEAD
      lastStatus:
        type: string
        enum:
          - up
          - down
          - unknown
        example: unknown
      lastCheckedAt:
        type: string
        format: date-time

  CheckResult:
    type: object
    properties:
      id:
        type: string
        example: chk_1
      monitorId:
        type: string
        example: mon_1
      checkedAt:
        type: string
        format: date-time
      status:
        type: string
        enum:
          - up
          - down
        example: up
      httpStatusCode:
        type: integer
        example: 200
      responseTimeMs:
        type: integer
        example: 153
      error:
        type: string
        example: null

  ErrorResponse:
    type: object
    properties:
      message:
        type: string
        example: Something went wrong